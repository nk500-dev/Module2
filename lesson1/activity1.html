<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>CSS Styling Examples</title>
        <link rel="stylesheet" href="style.css">
        <style>
            h2{
                color:green
            }
        </style>
    </head>
    <body>
        <h1 style="color:red">Inline Styling</h1>
        <h2>Internal CSS</h2>
        <h3>External Styling</h3>
        <p>External Group Styling</p>
        <hr>
        <!--Class and ID Selector Example-->
        <h2 class="myclass">Class selector with h2 tag</h2>
        <h2 id="myid">ID selector with h2 tag</h2>
        <h4 class="myclass">Class selector with h4 tag</h4>
    </body>
</html>
