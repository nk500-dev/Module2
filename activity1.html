<!DOCTYPE html>
<html>
    <head>
        <title>Positioning in CSS</title>
        <style>
            .box{
                border: 2px solid;
                padding: 7px;
                margin: 5px;
            }
            .relative{
                position: relative;
                left: 20px;
            }
            .fixed{
                position: fixed;
                background-color: aqua;
                top: 5px;
                right: 10px;
            }
            #div1{
                margin-top: 50px;
            }
            .sticky{
                position: sticky;
                top: 10px;
                width: 50%;
                background-color: pink;
            }
             .parent{
                position: relative;
                height: 100px;
                border: 5px solid;
            }
            .absolute{
                position: absolute;
                background-color: blue;
                top: 15px;
            }
           
        </style>
    </head>
    <body>
        <div id="div1" class="box">
            Starting Content
        </div>
        <div id="div2" class="box static">
            Static
        </div>
        <div id="div3" class="box relative">
            Relative
        </div>
        <div id="div4" class="box fixed">
            Fixed
        </div>
        <div id="div5" class="box sticky">
            Sticky
        </div>
        <div class="parent">
            Parent div
            <div id="div6" class="box absolute">
            Absolute
            </div>
        </div>
