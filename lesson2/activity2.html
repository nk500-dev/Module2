<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
            #gradient-div{
                height: 400px;
                background: linear-gradient(to right,pink,yellow,red);
            }
             #gradient-div2{
                height: 400px;
                background: linear-gradient(to bottom right,pink,yellow,red);
             }
             
        </style>
    </head>
    <body>
        <h2>Gradient</h2>
        <div id="gradient-div">
            <h1>Gradient Background</h1>
        </div>
        <div id="gradient-div2">
            <h1>Gradient Background</h1>
        </div>
    </body>
</html>
